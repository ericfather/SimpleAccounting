name: SimpleAccounting
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: 17.0
  generateEmptyDirectories: true
targets:
  SimpleAccounting:
    type: application
    platform: iOS
    sources:
      - path: SimpleAccounting
        buildPhase: sources
        createsGroup: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.SimpleAccounting
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        SWIFT_VERSION: 5.0
        INFOPLIST_FILE: SimpleAccounting/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ARCHS: arm64 x86_64
        VALID_ARCHS: arm64 x86_64
        SUPPORTED_PLATFORMS: iphonesimulator iphoneos
    scheme:
      configVariants:
        Debug:
          settings:
            SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          settings:
            SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""
