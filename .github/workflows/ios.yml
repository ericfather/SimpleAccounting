name: iOS Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Fix project.pbxproj
      run: |
        cat > simpleaccounting.xcodeproj/project.pbxproj << 'EOF'
        // !$*UTF8*$!
        {
        	archiveVersion = 1;
        	classes = {
        	};
        	objectVersion = 56;
        	objects = {
        /* Begin PBXBuildFile section */
        		A1200001000020000000000001 /* App.swift in Sources */ = {isa = PBXBuildFile; fileRef = A1200001000020000000000002 /* App.swift */; };
        /* End PBXBuildFile section */
        	};
        	rootObject = A1200001000020000000000028 /* Project object */;
        }
        EOF
    
    - name: Build
      run: |
        xcodebuild build \
          -project simpleaccounting.xcodeproj \
          -scheme SimpleAccounting \
          -sdk iphonesimulator \
          -destination 'platform=iOS Simulator,name=iPhone 17,OS=26.2' \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO
