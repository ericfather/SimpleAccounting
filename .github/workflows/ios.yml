name: iOS Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install XcodeGen
      run: |
        brew install xcodegen

    - name: Generate Xcode project
      run: |
        xcodegen generate
        # 验证生成的项目目录
        ls -la simpleaccounting.xcodeproj/

    - name: Build iOS app for simulator
      run: |
        xcodebuild build \
          -project simpleaccounting.xcodeproj \
          -scheme SimpleAccounting \
          -sdk iphonesimulator \
          -destination 'platform=iOS Simulator,name=iPhone 17,OS=26.2' \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    - name: Upload app artifact
      uses: actions/upload-artifact@v4
      with:
        name: SimpleAccounting-app
        path: ~/Library/Developer/Xcode/DerivedData/**/Build/Products/**/*.app
        retention-days: 7
