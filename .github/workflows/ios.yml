name: iOS Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode project
      run: xcodegen generate

    - name: Build for device (Release)
      run: |
        xcodebuild clean build \
          -project SimpleAccounting.xcodeproj \
          -scheme SimpleAccounting \
          -sdk iphoneos \
          -configuration Release \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGN_STYLE=Manual \
          PROVISIONING_PROFILE_SPECIFIER=""

    - name: Find and verify .app
      run: |
        APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "SimpleAccounting.app" -path "*/Release-iphoneos/*" -type d | head -n 1)
        if [ -z "$APP_PATH" ]; then
          echo "Error: No .app found for Release-iphoneos"
          exit 1
        fi
        echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV
        echo "App size:"
        du -sh "$APP_PATH"
        echo "Contents:"
        ls -la "$APP_PATH"
        # 检查可执行文件
        if [ -f "$APP_PATH/SimpleAccounting" ]; then
          echo "Executable exists"
        else
          echo "Warning: No executable found"
        fi

    - name: Create IPA
      run: |
        mkdir -p Payload
        cp -R "$APP_PATH" Payload/
        zip -r SimpleAccounting.ipa Payload
        rm -rf Payload
        echo "IPA size:"
        ls -lh SimpleAccounting.ipa

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: SimpleAccounting-IPA
        path: SimpleAccounting.ipa
        retention-days: 30
