name: iOS Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode project
      run: |
        rm -rf SimpleAccounting.xcodeproj
        xcodegen generate
    - name: Debug XcodeGen output
      run: |
        echo "=== project.pbxproj sections ==="
        grep -E "(PBXSourcesBuildPhase|PBXResourcesBuildPhase)" SimpleAccounting.xcodeproj/project.pbxproj -A 10
        echo ""
        echo "=== Files referenced in PBXBuildFile ==="
        grep "\.swift in Sources" SimpleAccounting.xcodeproj/project.pbxproj | wc -l
        echo "Swift files count in sources phase"
    - name: Clean and build for simulator (verbose)
      run: |
        rm -rf ~/Library/Developer/Xcode/DerivedData/*
        xcodebuild build \
          -project SimpleAccounting.xcodeproj \
          -scheme SimpleAccounting \
          -sdk iphonesimulator \
          -destination 'generic/platform=iOS Simulator' \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          -showBuildTimingSummary \
          -hideShellScriptEnvironment \
          OTHER_SWIFT_FLAGS="-Xfrontend -debug-time-function-bodies" \
          -verbose 2>&1 | tee build.log
    - name: Check object files
      run: |
        echo "=== Object files in DerivedData ==="
        find ~/Library/Developer/Xcode/DerivedData -name "*.o" | grep SimpleAccounting | wc -l
        echo "=== First few object files ==="
        find ~/Library/Developer/Xcode/DerivedData -name "*.o" | grep SimpleAccounting | head -10
    - name: Analyze executable
      run: |
        APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "SimpleAccounting.app" -path "*/Debug-iphonesimulator/*" -type d | head -n 1)
        if [ -f "$APP_PATH/SimpleAccounting" ]; then
          echo "=== Executable size ==="
          ls -lh "$APP_PATH/SimpleAccounting"
          echo "=== Load commands (size of __TEXT segment) ==="
          otool -l "$APP_PATH/SimpleAccounting" | grep -A 4 "segname __TEXT" | grep "size"
          echo "=== Symbol table size ==="
          size -m "$APP_PATH/SimpleAccounting"
          echo "=== Check if executable is stripped ==="
          file "$APP_PATH/SimpleAccounting"
        else
          echo "Executable not found"
        fi
    - name: Check compilation
      run: |
        COMPILE_COUNT=$(grep -c "SwiftCompile" build.log || echo "0")
        echo "Compiled Swift files count: $COMPILE_COUNT"
    - name: Show build log errors/warnings
      run: |
        echo "=== First 50 lines of build.log ==="
        head -50 build.log
        echo "=== Swift compilation lines ==="
        grep "CompileSwift" build.log | head -20
        echo "=== Errors and warnings ==="
        grep -E "error:|warning:" build.log | head -20
    - name: Package .app to .ipa
      run: |
        APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "SimpleAccounting.app" -path "*/Debug-iphonesimulator/*" -type d | head -n 1)
        if [ -z "$APP_PATH" ]; then
          echo "Error: .app not found"
          exit 1
        fi
        echo "App size:"
        du -sh "$APP_PATH"
        mkdir -p Payload
        cp -R "$APP_PATH" Payload/
        zip -r SimpleAccounting.ipa Payload
        rm -rf Payload
        ls -lh SimpleAccounting.ipa

    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: SimpleAccounting-IPA
        path: SimpleAccounting.ipa
        retention-days: 30
