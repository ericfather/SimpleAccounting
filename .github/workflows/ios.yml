name: iOS Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode project
      run: xcodegen generate

    - name: Clean and build
      run: |
        rm -rf ~/Library/Developer/Xcode/DerivedData/*
        xcodebuild build \
          -project SimpleAccounting.xcodeproj \
          -scheme SimpleAccounting \
          -sdk iphonesimulator \
          -configuration Debug \
          -destination 'platform=iOS Simulator,name=iPhone 17,OS=26.2' \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          -verbose 2>&1 | tee build.log

    - name: Check compilation
      run: |
        grep -c "CompileSwift" build.log || echo "0"

    - name: Package .app to .ipa
      run: |
        APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "SimpleAccounting.app" -path "*/Debug-iphonesimulator/*" -type d | head -n 1)
        if [ -z "$APP_PATH" ]; then
          echo "App not found"
          exit 1
        fi
        mkdir -p Payload
        cp -R "$APP_PATH" Payload/
        zip -r SimpleAccounting.ipa Payload
        rm -rf Payload
        ls -lh SimpleAccounting.ipa

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: SimpleAccounting-IPA
        path: SimpleAccounting.ipa
        retention-days: 30
