name: iOS Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode project
      run: xcodegen generate

    - name: Verify source files in project
      run: |
        echo "=== Swift files in directory ==="
        find SimpleAccounting -name "*.swift" | sort
        echo ""
        echo "=== Swift files in project ==="
        grep -o '/* [^ ]*\.swift' SimpleAccounting.xcodeproj/project.pbxproj | sort | uniq
        echo ""
        DIR_COUNT=$(find SimpleAccounting -name "*.swift" | wc -l)
        PROJ_COUNT=$(grep -c '\.swift in Sources' SimpleAccounting.xcodeproj/project.pbxproj || echo 0)
        echo "Directory count: $DIR_COUNT"
        echo "Project count: $PROJ_COUNT"
        if [ "$DIR_COUNT" -ne "$PROJ_COUNT" ]; then
          echo "⚠️ Warning: File count mismatch!"
        else
          echo "✅ All files are included in the project."
        fi

    - name: Build for simulator
      run: |
        xcodebuild build \
          -project SimpleAccounting.xcodeproj \
          -scheme SimpleAccounting \
          -sdk iphonesimulator \
          -configuration Debug \
          -destination 'platform=iOS Simulator,name=iPhone 17,OS=26.2' \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    - name: Package .app to .ipa
      run: |
        APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "SimpleAccounting.app" -path "*/Debug-iphonesimulator/*" -type d | head -n 1)
        echo "App size:"
        du -sh "$APP_PATH"
        mkdir -p Payload
        cp -R "$APP_PATH" Payload/
        zip -r SimpleAccounting.ipa Payload
        rm -rf Payload
        ls -lh SimpleAccounting.ipa

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: SimpleAccounting-IPA
        path: SimpleAccounting.ipa
        retention-days: 30
