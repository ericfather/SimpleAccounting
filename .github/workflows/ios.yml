name: iOS Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode project
      run: |
        rm -rf SimpleAccounting.xcodeproj
        xcodegen generate
    - name: Debug XcodeGen output
      run: |
        echo "=== project.pbxproj sections ==="
        grep -E "(PBXSourcesBuildPhase|PBXResourcesBuildPhase)" SimpleAccounting.xcodeproj/project.pbxproj -A 10
        echo ""
        echo "=== Files referenced in PBXBuildFile ==="
        grep "\.swift in Sources" SimpleAccounting.xcodeproj/project.pbxproj | wc -l
        echo "Swift files count in sources phase"
    - name: Clean and build for simulator
      run: |
        rm -rf ~/Library/Developer/Xcode/DerivedData/*
        xcodebuild build \
          -project SimpleAccounting.xcodeproj \
          -scheme SimpleAccounting \
          -sdk iphonesimulator \
          -destination 'generic/platform=iOS Simulator' \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    - name: Find .app path
      id: find_app
      run: |
        APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "SimpleAccounting.app" -path "*/Debug-iphonesimulator/*" -type d | head -n 1)
        if [ -z "$APP_PATH" ]; then
          echo "Error: .app not found"
          exit 1
        fi
        echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV
        echo "App size:"
        du -sh "$APP_PATH"

    - name: Upload .app artifact
      uses: actions/upload-artifact@v4
      with:
        name: SimpleAccounting-app
        path: ${{ env.APP_PATH }}
        retention-days: 30
