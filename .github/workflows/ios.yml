name: iOS Build (Unsigned IPA)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode project
      run: xcodegen generate

    - name: Build for device (unsigned)
      run: |
        rm -rf ~/Library/Developer/Xcode/DerivedData/*
        xcodebuild build \
          -project SimpleAccounting.xcodeproj \
          -scheme SimpleAccounting \
          -sdk iphoneos \
          -configuration Debug \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGN_STYLE=Manual \
          PROVISIONING_PROFILE_SPECIFIER=""
    - name: Check app architecture (should be arm64)
      run: |
        APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "SimpleAccounting.app" -path "*/Debug-iphoneos/*" -type d | head -n 1)
        if [ -z "$APP_PATH" ]; then
          echo "Error: Device .app not found"
          exit 1
        fi
        EXECUTABLE="$APP_PATH/SimpleAccounting"
        if [ -f "$EXECUTABLE" ]; then
          echo "=== Architectures in executable ==="
          lipo -info "$EXECUTABLE"
          # 检查是否包含 arm64
          if lipo -info "$EXECUTABLE" | grep -q "arm64"; then
            echo "✅ arm64 architecture found - good for device"
          else
            echo "⚠️ Warning: arm64 not found! This .app may not run on real device."
          fi
        else
          echo "Executable not found"
        fi
    - name: Find device .app path
      id: find_app
      run: |
        APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "SimpleAccounting.app" -path "*/Debug-iphoneos/*" -type d | head -n 1)
        if [ -z "$APP_PATH" ]; then
          echo "Error: Device .app not found"
          exit 1
        fi
        echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV
        echo "App found at: $APP_PATH"
        du -sh "$APP_PATH"

    - name: Package .app into unsigned IPA
      run: |
        mkdir -p Payload
        cp -R "$APP_PATH" Payload/
        zip -r SimpleAccounting_unsigned.ipa Payload
        rm -rf Payload
        echo "IPA created: SimpleAccounting_unsigned.ipa"
        ls -lh SimpleAccounting_unsigned.ipa

    - name: Upload unsigned IPA
      uses: actions/upload-artifact@v4
      with:
        name: SimpleAccounting-Unsigned-IPA
        path: SimpleAccounting_unsigned.ipa
        retention-days: 30
