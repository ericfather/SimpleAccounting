name: iOS Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode project
      run: xcodegen generate

    - name: Build for simulator (Debug)
      run: |
        xcodebuild build \
          -project SimpleAccounting.xcodeproj \
          -scheme SimpleAccounting \
          -sdk iphonesimulator \
          -configuration Debug \
          -destination 'platform=iOS Simulator,name=iPhone 17,OS=26.2' \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    - name: Find simulator .app and package as .ipa
      run: |
        SIM_APP=$(find ~/Library/Developer/Xcode/DerivedData -name "SimpleAccounting.app" -path "*/Debug-iphonesimulator/*" -type d | head -n 1)
        if [ -z "$SIM_APP" ]; then
          echo "Error: Simulator .app not found"
          exit 1
        fi
        echo "Simulator .app size:"
        du -sh "$SIM_APP"
        echo "Contents:"
        ls -la "$SIM_APP"
        mkdir -p Payload
        cp -R "$SIM_APP" Payload/
        zip -r SimpleAccounting-simulator.ipa Payload
        rm -rf Payload
        echo "IPA created:"
        ls -lh SimpleAccounting-simulator.ipa

    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: SimpleAccounting-Simulator-IPA
        path: SimpleAccounting-simulator.ipa
        retention-days: 30
