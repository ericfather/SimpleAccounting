name: iOS Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: List available simulators
      run: |
        xcrun simctl list devices available

    - name: Build iOS app for simulator
      run: |
        xcodebuild build -project "simpleaccounting.xcodeproj" -scheme "SimpleAccounting" -sdk iphonesimulator -destination 'platform=iOS Simulator,name=iPhone 17,OS=26.2' CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO

    - name: Build iOS app for device
      run: |
        xcodebuild build -project "simpleaccounting.xcodeproj" -scheme "SimpleAccounting" -sdk iphoneos -destination 'generic/platform=iOS' CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO DEVELOPMENT_TEAM=""

    - name: Create IPA file - Simulator Version
      run: |
        mkdir -p build
        echo "=== Creating Simulator Version IPA ==="
        SIM_APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "SimpleAccounting.app" -path "*iphonesimulator*" -type d | head -n 1)
        if [ -n "$SIM_APP_PATH" ]; then
          echo "Found simulator app: $SIM_APP_PATH"
          du -sh "$SIM_APP_PATH"

          mkdir -p Payload
          cp -R "$SIM_APP_PATH" Payload/
          zip -r "build/SimpleAccounting-v1.0-SIMULATOR.ipa" Payload
          rm -rf Payload
          echo "Created: SimpleAccounting-v1.0-SIMULATOR.ipa"
          ls -lh build/*.ipa
        else
          echo "Simulator app not found"
        fi

    - name: Create IPA file - Device Version
      run: |
        mkdir -p build
        echo "=== Creating Device Version IPA ==="
        DEVICE_APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "SimpleAccounting.app" -path "*iphoneos*" -type d | head -n 1)
        if [ -n "$DEVICE_APP_PATH" ]; then
          echo "Found device app: $DEVICE_APP_PATH"
          du -sh "$DEVICE_APP_PATH"
          ls -la "$DEVICE_APP_PATH/"

          mkdir -p Payload
          cp -R "$DEVICE_APP_PATH" Payload/
          zip -r "build/SimpleAccounting-v1.0-DEVICE.ipa" Payload
          rm -rf Payload
          echo "Created: SimpleAccounting-v1.0-DEVICE.ipa"
          ls -lh build/*.ipa
        else
          echo "Device app not found in DerivedData"
          ls -la ~/Library/Developer/Xcode/DerivedData/ | head -n 20
          exit 1
        fi

    - name: Upload IPA artifacts
      uses: actions/upload-artifact@v4
      with:
        name: SimpleAccounting-All-IPAs
        path: build/*.ipa
        retention-days: 30
