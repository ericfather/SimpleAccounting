name: iOS Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode project
      run: xcodegen generate

    - name: Build for simulator (creates .app)
      run: |
        xcodebuild build \
          -project SimpleAccounting.xcodeproj \
          -scheme SimpleAccounting \
          -sdk iphonesimulator \
          -destination 'platform=iOS Simulator,name=iPhone 17,OS=26.2' \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    - name: Build for device (creates .app for archiving)
      run: |
        xcodebuild build \
          -project SimpleAccounting.xcodeproj \
          -scheme SimpleAccounting \
          -sdk iphoneos \
          -configuration Release \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    - name: Create IPA from device build
      run: |
        # 找到生成的 .app 路径
        APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "SimpleAccounting.app" -path "*/Release-iphoneos/*" | head -n 1)
        if [ -z "$APP_PATH" ]; then
          echo "Error: .app not found"
          exit 1
        fi
        echo "Found app at: $APP_PATH"
        
        # 创建临时文件夹
        mkdir -p Payload
        cp -R "$APP_PATH" Payload/
        
        # 打包成 IPA
        zip -r SimpleAccounting.ipa Payload
        rm -rf Payload
        
        echo "IPA created: SimpleAccounting.ipa"
        ls -lh SimpleAccounting.ipa

    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: SimpleAccounting-IPA
        path: SimpleAccounting.ipa
        retention-days: 30
